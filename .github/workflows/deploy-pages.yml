# GitHub Pages fallback deploy.
#
# Vercel is the primary target (see README). This workflow exists so the site
# can also be served from a github.io project page if Vercel is unavailable.
# Enable it under Settings → Pages → "Build and deployment" → Source:
# "GitHub Actions". It is manual-only by default to avoid competing with
# Vercel on every push; trigger it from the Actions tab when needed.
name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static export
        # Project pages are served from /<repo>, so set the base path.
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ format('/{0}', github.event.repository.name) }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
